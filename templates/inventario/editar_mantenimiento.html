# inventario/editar_mantenimiento.html

{% extends 'base.html' %}

{% block content %}

    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar Cambios</button>
  </form>
  <a href="{% url 'detalle_mantenimiento' mantenimiento.id %}">Cancelar</a>
{% endblock %}
