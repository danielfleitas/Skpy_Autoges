
{% extends 'base.html' %}

{% block content %}
  <h1>Detalle del Repuesto</h1>
  <p><strong>Nombre:</strong> {{ repuesto.nombre }}</p>
  <p><strong>Descripción:</strong> {{ repuesto.descripcion }}</p>
  <p><strong>Precio:</strong> ${{ repuesto.precio }}</p>
  <p><strong>Cantidad en Stock:</strong> {{ repuesto.cantidad }}</p>
  <a href="{% url 'lista_repuestos' %}">Volver a la Lista de Repuestos</a>
{% endblock %}
