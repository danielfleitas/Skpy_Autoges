
{% extends 'base.html' %}

{% block content %}
  <h2>Eliminar Permiso</h2>
  <p>¿Estás seguro de que deseas eliminar el permiso "{{ permiso.nombre }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
  </form>
  <a href="{% url 'lista_permisos' %}" class="btn btn-secondary">Cancelar</a>
{% endblock %}
