
{% extends 'base.html' %}

{% block content %}
  <h2>Lista de Permisos</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
      </tr>
    </thead>
    <tbody>
      {% for permiso in permisos %}
        <tr>
          <td>{{ permiso.id }}</td>
          <td>{{ permiso.nombre }}</td>
          <td>{{ permiso.descripcion }}</td>
          <td>
            <a href="{% url 'editar_permiso' permiso.id %}" class="btn btn-warning">Editar</a>
            <a href="{% url 'eliminar_permiso' permiso.id %}" class="btn btn-danger">Eliminar</a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <a href="{% url 'crear_permiso' %}" class="btn btn-primary">Agregar Permiso</a>

{% endblock %}
