{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
      <h2 class="mb-4 text-center">Agregar Empleado</h2>
      <form method="POST" class="needs-validation" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label">
              {{ field.label }}
              {% if field.field.required %}
                <span style="color: red;">*</span>
              {% endif %}
            </label>
            {{ field }}
            
            {% if field.errors %}
              <div class="text-danger small">
                {{ field.errors|striptags }}
              </div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100">Agregar</button>
        <a href="{% url 'lista_empleados' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
      </form>
      <p class="mt-3 text-center"><span style="color: red;">*</span> Campos obligatorios</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const departamentoSelect = document.getElementById('id_departamento');
      const cargoSelect = document.getElementById('id_cargo');

      if (departamentoSelect && cargoSelect) {
        departamentoSelect.addEventListener('change', function() {
          const departamentoId = this.value;
          cargoSelect.innerHTML = '<option value="">---------</option>'; // Limpia cargos
          if (departamentoId) {
            fetch("{% url 'obtener_cargos' %}?departamento_id=" + departamentoId)
              .then(response => response.json())
              .then(data => {
                data.forEach(function(cargo) {
                  const option = document.createElement('option');
                  option.value = cargo.id;
                  option.text = cargo.nombre;
                  cargoSelect.appendChild(option);
                });
              });
          }
        });
      }
    });
  </script>
{% endblock %}
