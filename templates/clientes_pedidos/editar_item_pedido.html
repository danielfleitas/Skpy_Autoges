# Edición del Item de Pedido
{% extends 'base.html' %}

{% block content %}
  <h2>Editar Item de Pedido</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar Cambios</button>
  </form>
  <a href="{% url 'lista_items_pedido' item.pedido.id %}">Volver a la lista de items del pedido</a>
{% endblock %}
