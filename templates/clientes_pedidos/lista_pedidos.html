# Lista de Pedidos
{% extends 'base.html' %}

{% block content %}
  <h2>Lista de Pedidos</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Fecha</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      {% for pedido in pedidos %}
      <tr>
        <td>{{ pedido.id }}</td>
        <td>{{ pedido.cliente.nombre }}</td>
        <td>{{ pedido.fecha }}</td>
        <td>{{ pedido.total }}</td>
        <td>
          <a href="{% url 'editar_pedido' pedido.id %}">Editar</a>
          <a href="{% url 'detalle_pedido' pedido.id %}">Ver Detalle</a>
          <a href="{% url 'crear_cotizacion' pedido.id %}">Crear Cotización</a>
          <!-- Aquí puedes agregar más acciones como eliminar -->
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
