{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container py-4">
  <h1 class="text-center mb-4">Agregar Agente de Transporte</h1>
  <div class="d-flex justify-content-center">
    <div class="card shadow p-4" style="width: 100%; max-width: 500px; background-color: #fff;">
      <form method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label text-dark">
              {{ field.label }}
              {% if field.field.required %}
                <span style="color: #dc3545;">*</span>
              {% endif %}
            </label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small">
                {{ field.errors|striptags }}
              </div>
            {% endif %}
          </div>
        {% endfor %}
        <div class="text-center">
          <button type="submit" class="btn btn-primary w-100">Guardar</button>
          <a href="{% url 'lista_agentes_transporte' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </div>
      </form>
      <p class="mt-3 text-center text-dark"><span style="color: #dc3545;">*</span> Campos obligatorios</p>
    </div>
  </div>
</div>
{% endblock %}
