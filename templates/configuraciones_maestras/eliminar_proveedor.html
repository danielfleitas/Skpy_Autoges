# Eliminar Proveedor
{% extends 'base.html' %}

{% block content %}
  <h2>Eliminar Proveedor</h2>
  <p>¿Estás seguro de que deseas eliminar el proveedor "{{ proveedor.nombre }}"?</p>
  
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'lista_proveedores' %}" class="btn btn-secondary">Cancelar</a>
  </form>
{% endblock %}
