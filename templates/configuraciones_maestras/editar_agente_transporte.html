# Edición de agente de transporte
{% extends 'base.html' %}

{% block title %}Editar Agente de Transporte{% endblock %}

{% block content %}
    <h1>Editar Agente de Transporte</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar cambios</button>
    </form>
    <a href="{% url 'lista_agentes_transporte' %}">Volver a la lista de agentes de transporte</a>
{% endblock %}
